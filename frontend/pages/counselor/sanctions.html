<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counselor Sanction Visibility</title>
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>

<div class="dashboard-container">
  <div class="topbar">
    <h1>Sanction Follow-Up Visibility</h1>
    <div>
      <a href="dashboard.html"><button>Back</button></a>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="card">
    <h2>Sanctions</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Case</th>
            <th>Student</th>
            <th>Type</th>
            <th>Status</th>
            <th>Schedule</th>
          </tr>
        </thead>
        <tbody id="sanctionTable">
          <tr><td colspan="5">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="../../js/core/api.js"></script>
<script src="../../js/core/auth.js"></script>
<script>
requireAuth();
const user = getUser();
if (!user || user.role !== "guidance_counselor") { alert("Access denied"); logout(); }

async function loadSanctions() {
  const res = await apiRequest("/sanctions/all", "GET", null, true);
  const table = document.getElementById("sanctionTable");

  if (!res.success) {
    table.innerHTML = `<tr><td colspan="5">${res.message}</td></tr>`;
    return;
  }

  if (!res.sanctions.length) {
    table.innerHTML = `<tr><td colspan="5">No sanctions found.</td></tr>`;
    return;
  }

  table.innerHTML = res.sanctions.map(s => `
    <tr>
      <td>${s.case_number}</td>
      <td>${s.first_name} ${s.last_name} (${s.student_number})</td>
      <td>${s.sanction_type}</td>
      <td>${s.status}</td>
      <td>${s.start_date || "-"} to ${s.end_date || "-"}</td>
    </tr>
  `).join("");
}

loadSanctions();
</script>

</body>
</html>
