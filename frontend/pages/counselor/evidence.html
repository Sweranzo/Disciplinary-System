<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counselor Evidence Visibility</title>
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>

<div class="dashboard-container">
  <div class="topbar">
    <div>
      <h1>Evidence Visibility</h1>
      <p class="muted">View uploaded case evidence and review status for student support context.</p>
    </div>
    <div class="action-row">
      <a href="dashboard.html"><button class="secondary">Back</button></a>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="card page-section">
    <div class="card-header">
      <div>
        <h2>Evidence</h2>
        <p class="muted">Counselor access is read-only; evidence review remains with admin and discipline officers.</p>
      </div>
    </div>
    <div class="table-wrap">
      <div class="toolbar">
        <input type="search" id="evidenceSearch" placeholder="Search case, student, file, review note">
        <select id="statusFilter">
          <option value="">All Review Statuses</option>
          <option value="pending">Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
      <table>
        <thead>
          <tr>
            <th>Case</th>
            <th>Student</th>
            <th>File</th>
            <th>Uploaded</th>
            <th>Status</th>
            <th>Review Note</th>
          </tr>
        </thead>
        <tbody id="evidenceTable">
          <tr><td colspan="6">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="../../js/core/api.js"></script>
<script src="../../js/core/auth.js"></script>
<script>
requireAuth();
const user = getUser();
if (!user || user.role !== "guidance_counselor") {
  alert("Access denied");
  logout();
}

function badge(value) {
  return `<span class="badge ${value}">${String(value || "-").replaceAll("_", " ")}</span>`;
}

let allEvidence = [];

async function loadEvidence() {
  const res = await apiRequest("/evidence/all", "GET", null, true);
  const table = document.getElementById("evidenceTable");

  if (!res.success) {
    table.innerHTML = `<tr><td colspan="6">${res.message}</td></tr>`;
    return;
  }

  allEvidence = res.evidence || [];
  applyFilters();
}

function renderEvidence(items) {
  const table = document.getElementById("evidenceTable");

  if (!items.length) {
    table.innerHTML = `<tr><td colspan="6">No evidence found.</td></tr>`;
    return;
  }

  table.innerHTML = items.map(item => `
    <tr>
      <td><strong>${item.case_number}</strong><br><a href="case-details.html?id=${item.case_id}">Open Case</a></td>
      <td>${item.first_name} ${item.last_name} (${item.student_number})</td>
      <td><a href="http://localhost:5000${item.file_path}" target="_blank">${item.original_name || item.file_name}</a></td>
      <td>${item.uploaded_at}</td>
      <td>${badge(item.review_status)}</td>
      <td>${item.review_notes || "-"}</td>
    </tr>
  `).join("");
}

function applyFilters() {
  const search = document.getElementById("evidenceSearch").value.trim().toLowerCase();
  const status = document.getElementById("statusFilter").value;

  renderEvidence(allEvidence.filter(item => {
    const matchesStatus = !status || item.review_status === status;
    const matchesSearch = !search || [
      item.case_number,
      item.first_name,
      item.last_name,
      item.student_number,
      item.original_name,
      item.file_name,
      item.review_status,
      item.review_notes
    ].some(value => String(value || "").toLowerCase().includes(search));

    return matchesStatus && matchesSearch;
  }));
}

document.getElementById("evidenceSearch").addEventListener("input", applyFilters);
document.getElementById("statusFilter").addEventListener("change", applyFilters);
loadEvidence();
</script>

</body>
</html>
