<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counselor Hearing Visibility</title>
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>

<div class="dashboard-container">
  <div class="topbar">
    <div>
      <h1>Hearing Support Visibility</h1>
      <p class="muted">Track scheduled, completed, and cancelled hearings tied to counselor support work.</p>
    </div>
    <div class="action-row">
      <a href="dashboard.html"><button class="secondary">Back</button></a>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="card page-section">
    <div class="card-header">
      <div>
        <h2>Hearings</h2>
        <p class="muted">Open a case to add counselor notes or review student history.</p>
      </div>
    </div>
    <div class="table-wrap">
      <div class="toolbar">
        <input type="search" id="hearingSearch" placeholder="Search case, student, violation, location">
        <select id="statusFilter">
          <option value="">All Statuses</option>
          <option value="scheduled">Scheduled</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <table>
        <thead>
          <tr>
            <th>Case</th>
            <th>Student</th>
            <th>Violation</th>
            <th>Date</th>
            <th>Time</th>
            <th>Location</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="hearingTable">
          <tr><td colspan="8">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="../../js/core/api.js"></script>
<script src="../../js/core/auth.js"></script>
<script>
requireAuth();
const user = getUser();
if (!user || user.role !== "guidance_counselor") { alert("Access denied"); logout(); }

function badge(value) {
  return `<span class="badge ${value}">${String(value || "-").replaceAll("_", " ")}</span>`;
}

async function loadHearings() {
  const res = await apiRequest("/hearings/all", "GET", null, true);
  const table = document.getElementById("hearingTable");

  if (!res.success) {
    table.innerHTML = `<tr><td colspan="8">${res.message}</td></tr>`;
    return;
  }

  allHearings = res.hearings || [];
  applyFilters();
}

let allHearings = [];

function renderHearings(items) {
  const table = document.getElementById("hearingTable");

  if (!items.length) {
    table.innerHTML = `<tr><td colspan="8">No hearings found.</td></tr>`;
    return;
  }

  table.innerHTML = items.map(h => `
    <tr>
      <td>${h.case_number}</td>
      <td>${h.first_name} ${h.last_name} (${h.student_number})</td>
      <td>${h.violation_type}</td>
      <td>${h.scheduled_date}</td>
      <td>${h.scheduled_time}</td>
      <td>${h.location || "-"}</td>
      <td>${badge(h.status)}</td>
      <td><a href="case-details.html?id=${h.case_id}"><button type="button">Open Case</button></a></td>
    </tr>
  `).join("");
}

function applyFilters() {
  const search = document.getElementById("hearingSearch").value.trim().toLowerCase();
  const status = document.getElementById("statusFilter").value;

  renderHearings(allHearings.filter(h => {
    const matchesStatus = !status || h.status === status;
    const matchesSearch = !search || [
      h.case_number,
      h.first_name,
      h.last_name,
      h.student_number,
      h.violation_type,
      h.location,
      h.status
    ].some(value => String(value || "").toLowerCase().includes(search));

    return matchesStatus && matchesSearch;
  }));
}

document.getElementById("hearingSearch").addEventListener("input", applyFilters);
document.getElementById("statusFilter").addEventListener("change", applyFilters);
loadHearings();
</script>

</body>
</html>
