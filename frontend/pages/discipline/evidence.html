<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evidence Review Center</title>
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
<div class="dashboard-container">
  <div class="topbar">
    <div>
      <h1>Evidence Review Center</h1>
      <p class="muted">Review uploaded evidence files and keep the case workflow moving.</p>
    </div>
    <div class="action-row">
      <a href="dashboard.html"><button type="button" class="secondary compact-btn">Back</button></a>
      <button onclick="logout()" type="button" class="compact-btn">Logout</button>
    </div>
  </div>

  <div class="summary-band">
    <div class="summary-chip"><strong>Total Files</strong><span id="evidenceTotal">0</span></div>
    <div class="summary-chip"><strong>Pending</strong><span id="evidencePending">0</span></div>
    <div class="summary-chip"><strong>Approved</strong><span id="evidenceApproved">0</span></div>
    <div class="summary-chip"><strong>Rejected</strong><span id="evidenceRejected">0</span></div>
  </div>

  <div class="card page-section">
    <div class="card-header">
      <div>
        <h2>Evidence Queue</h2>
        <p class="muted">Filter files, inspect the source case, and save evidence decisions.</p>
      </div>
      <button type="button" id="refreshBtn" class="secondary">Refresh</button>
    </div>
    <div class="toolbar">
      <input type="search" id="evidenceSearch" placeholder="Search case, student, file, uploader, notes">
      <select id="statusFilter">
        <option value="">All Review Statuses</option>
        <option value="pending">Pending</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
      </select>
    </div>
    <div id="evidenceTable" class="evidence-library-list">Loading...</div>
  </div>
</div>

<script src="../../js/core/api.js"></script>
<script src="../../js/core/auth.js"></script>
<script src="../../js/admin/evidence-workspace.js"></script>
<script>
requireAuth();
const user = getUser();
if (!user || user.role !== "discipline_officer") {
  alert("Access denied");
  logout();
}

initEvidenceWorkspace({
  canReview: true,
  caseDetailsPath: "case-details.html"
});
</script>
</body>
</html>
