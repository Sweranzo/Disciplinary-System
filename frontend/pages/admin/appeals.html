<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appeals Board</title>
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body class="admin-page">
<div class="dashboard-container">
  <div class="topbar">
    <div>
      <h1>Appeals Board</h1>
      <p class="muted">Monitor submitted appeals, record board decisions, and open the linked case timeline.</p>
    </div>
    <div class="action-row">
      <a href="dashboard.html"><button type="button" class="secondary compact-btn">Back</button></a>
      <button onclick="logout()" type="button" class="compact-btn">Logout</button>
    </div>
  </div>

  <div class="summary-band">
    <div class="summary-chip"><strong>Total Appeals</strong><span id="appealTotal">0</span></div>
    <div class="summary-chip"><strong>Open</strong><span id="appealOpen">0</span></div>
    <div class="summary-chip"><strong>Approved</strong><span id="appealApproved">0</span></div>
    <div class="summary-chip"><strong>Rejected</strong><span id="appealRejected">0</span></div>
  </div>

  <div class="card page-section">
    <div class="card-header">
      <div>
        <h2>Appeal Review Queue</h2>
        <p class="muted">Search appeals, update decisions, and keep workflow history synchronized.</p>
      </div>
      <button type="button" id="refreshBtn" class="secondary">Refresh</button>
    </div>
    <div class="toolbar">
      <input type="search" id="appealSearch" placeholder="Search case, student, reason, decision notes">
      <select id="statusFilter">
        <option value="">All Appeals</option>
        <option value="submitted">Submitted</option>
        <option value="under_review">Under Review</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
      </select>
    </div>
    <div id="appealsList">Loading...</div>
  </div>
</div>

<script src="../../js/core/api.js"></script>
<script src="../../js/core/auth.js"></script>
<script src="../../js/admin/appeals-workspace.js"></script>
<script>
requireAuth();
const user = getUser();
if (!user || user.role !== "admin") {
  alert("Access denied");
  logout();
}

initAppealsWorkspace({
  canReview: true,
  caseDetailsPath: "case-details.html",
  studentProfilePath: "student-profile.html"
});
</script>
</body>
</html>
