<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Appeals</title>
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>

<div class="dashboard-container">
  <div class="topbar">
    <div>
      <h1>Appeals Moved to Cases</h1>
      <p class="muted">Appeals are now submitted from the specific case record.</p>
    </div>
    <div class="action-row">
      <a href="cases.html"><button type="button">Go to Cases</button></a>
      <button onclick="logout()" type="button">Logout</button>
    </div>
  </div>

  <div class="card page-section">
    <p class="muted">Redirecting to your case list...</p>
  </div>
</div>

<script src="../../js/core/api.js"></script>
<script src="../../js/core/auth.js"></script>
<script>
requireAuth();

const user = getUser();
if (!user || user.role !== "student") {
  alert("Access denied");
  logout();
}

setTimeout(() => {
  window.location.href = "cases.html";
}, 800);
</script>

</body>
</html>
