<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Notifications</title>
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>

<div class="dashboard-container">
  <div class="topbar">
    <div>
      <h1>Notifications</h1>
      <p class="muted">Opening the notification center...</p>
    </div>
    <div class="action-row">
      <a href="../common/notifications.html"><button type="button">Open Notifications</button></a>
      <button onclick="logout()" type="button">Logout</button>
    </div>
  </div>
</div>

<script src="../../js/core/api.js"></script>
<script src="../../js/core/auth.js"></script>
<script>
requireAuth();

const user = getUser();
if (!user || user.role !== "student") {
  alert("Access denied");
  logout();
}

window.location.href = "../common/notifications.html";
</script>

</body>
</html>
